<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amde-Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1877F2; --dark-bg: #1e1e21; --white: #ffffff; --gold: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 75px; }
        
        /* Reusable Header Style */
        .app-header { 
            background: linear-gradient(45deg, #1e1e21, #3a3d42); 
            color: var(--gold); 
            padding: 25px 15px; 
            text-align: center; 
            border-bottom: 4px solid var(--gold);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .logo-text {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            display: block;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .quote-text {
            font-size: 15px;
            line-height: 1.6;
            font-style: italic;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Auth/Login Design */
        .auth-container { padding: 20px; }
        .auth-card { background: white; padding: 30px 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: -30px; position: relative; z-index: 10; }
        
        .input-group { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s; }
        .input-group:focus { border-color: var(--primary); box-shadow: 0 0 5px rgba(24,119,242,0.2); }
        
        .phone-row { display: flex; border: 1px solid #ddd; border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
        .phone-row span { background: #f8f9fa; padding: 14px; font-weight: bold; color: #555; border-right: 1px solid #ddd; }
        
        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 70px; align-items: center; z-index: 1001; }
        .nav-item { flex: 1; text-align: center; color: #65676b; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 4px; }
        .nav-item span { font-size: 11px; font-weight: bold; }

        .page { display: none; padding: 20px; max-width: 600px; margin: auto; animation: fadeIn 0.4s; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-primary { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 17px; cursor: pointer; transition: 0.3s; }
        .btn-primary:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <header class="app-header">
        <span class="logo-text">Amde-Chat</span>
        <div class="quote-text">
            "ትላንት በዓለት ላይ ጥበብን ቀረጽን፤ ዛሬ በዲጂታሉ ዓለም 'አምድ-ቻት'ን መሰረትን። ከዛጉዌ ታላቅነት ወደ አምድ የቴክኖሎጂ ምህዳር! 🏰✨"
        </div>
    </header>

    <div id="auth-page" class="page active-page">
        <div class="auth-container">
            <div class="auth-card">
                <h2 id="auth-title" style="text-align:center; color: var(--primary); margin-top: 0;">እንኳን ደህና መጡ</h2>
                <div id="reg-fields" style="display:none;">
                    <input type="text" id="fullName" class="input-group" placeholder="ሙሉ ስም">
                </div>
                <div class="phone-row">
                    <span>+251</span>
                    <input type="text" id="email" style="border:none; width:100%; padding:14px; outline:none; font-size:16px;" placeholder="ስልክ ቁጥር ወይም ኢሜይል">
                </div>
                <input type="password" id="password" class="input-group" placeholder="የምስጢር ቁጥር">
                <button class="btn-primary" id="auth-btn" onclick="handleAuth()">ግባ</button>
                <p id="toggle-text" onclick="toggleAuth()" style="text-align:center; color: var(--primary); cursor: pointer; margin-top: 20px; font-size: 14px;">አዲስ አካውንት ለመክፈት እዚህ ይጫኑ</p>
            </div>
        </div>
    </div>

    <div id="home" class="page"><h3>🏠 የዜና ምንጭ (Feed)</h3><div id="feed-items"></div></div>
    <div id="chat" class="page"><h3>💬 መልዕክቶች</h3></div>
    <div id="video" class="page"><h3>🎥 ቪዲዮዎች</h3></div>
    <div id="settings" class="page"><h3>⚙️ ማስተካከያ</h3><button class="btn-primary" style="background:#f44336" onclick="logout()">ውጣ (Logout)</button></div>

    <nav class="bottom-nav" id="bottom-bar" style="display:none;">
        <div class="nav-item active" onclick="showTab('home', this)"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="showTab('chat', this)"><i class="fas fa-comments"></i><span>Chat</span></div>
        <div class="nav-item" onclick="showTab('video', this)"><i class="fas fa-play-circle"></i><span>Video</span></div>
        <div class="nav-item" onclick="showTab('settings', this)"><i class="fas fa-user-cog"></i><span>Settings</span></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHcrGqhXf4tkIqPi1sMCFC4zo9XrRoBFE",
            authDomain: "amde-chat-46e14.firebaseapp.com",
            projectId: "amde-chat-46e14",
            storageBucket: "amde-chat-46e14.firebasestorage.app",
            messagingSenderId: "1087288685786",
            appId: "1:1087288685786:web:467d7fce6555cc0544a1e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.showTab = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('bottom-bar').style.display = 'flex';
                document.getElementById('home').classList.add('active-page');
            } else {
                document.getElementById('auth-page').style.display = 'block';
                document.getElementById('bottom-bar').style.display = 'none';
            }
        });

        window.handleAuth = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            const isReg = document.getElementById('auth-btn').innerText === "ተመዝገብ";
            const finalEmail = e.includes('@') ? e : e + "@amde.com"; 
            try {
                if (isReg) {
                    const fn = document.getElementById('fullName').value;
                    const uc = await createUserWithEmailAndPassword(auth, finalEmail, p);
                    await setDoc(doc(db, "users", uc.user.uid), { fullName: fn, email: e });
                } else {
                    await signInWithEmailAndPassword(auth, finalEmail, p);
                }
            } catch (err) { alert(err.message); }
        };

        window.toggleAuth = () => {
            const isLogin = document.getElementById('auth-btn').innerText === "ግባ";
            document.getElementById('auth-title').innerText = isLogin ? "መመዝገቢያ" : "እንኳን ደህና መጡ";
            document.getElementById('auth-btn').innerText = isLogin ? "ተመዝገብ" : "ግባ";
            document.getElementById('reg-fields').style.display = isLogin ? "block" : "none";
        };

        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
