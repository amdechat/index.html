<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amde-Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@800&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary-glow: #00d2ff;
            --royal-gold: #FFD700; 
            --deep-dark: #0f0f11;
            --accent-blue: #1877F2;
        }

        body { 
            font-family: 'Noto Sans Ethiopic', sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            padding-bottom: 80px; 
        }
        
        /* 🏰 ቆንጆ ቀለም የተሰጠው ራስጌ */
        header { 
            background: linear-gradient(180deg, #000000 0%, #1c1c1e 100%); 
            padding: 40px 20px; 
            text-align: center; 
            border-bottom: 4px solid var(--royal-gold);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .logo-style {
            font-family: 'Cinzel', serif;
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 15px;
            display: block;
            letter-spacing: 5px;
        }

        /* "Amde" የሚለው ቃል ልዩ ቀለም */
        .amde-text {
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8), 0 0 30px rgba(255, 215, 0, 0.4);
        }

        .chat-text {
            color: var(--royal-gold);
            font-weight: 400;
        }

        .quote-style {
            font-size: 16px;
            line-height: 1.8;
            color: #e0e0e0;
            max-width: 600px;
            margin: 15px auto 0;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            padding-top: 15px;
        }

        /* 🔐 የመግቢያ ሳጥን (Premium Card) */
        .auth-container { padding: 0 20px; }
        .auth-card { 
            background: #ffffff; 
            padding: 40px 30px; 
            border-radius: 30px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); 
            max-width: 420px;
            margin: -40px auto 0;
            position: relative;
        }

        .input-field { 
            width: 100%; padding: 18px; margin-bottom: 20px; 
            border: 2px solid #f0f0f0; border-radius: 15px; 
            font-size: 16px; outline: none; transition: 0.3s;
            background: #f9f9f9;
        }
        .input-field:focus { border-color: var(--accent-blue); background: #fff; }
        
        .btn-main { 
            background: linear-gradient(90deg, #1877F2 0%, #0052cc 100%); 
            color: white; border: none; padding: 18px; width: 100%; 
            border-radius: 15px; font-weight: bold; font-size: 18px; 
            cursor: pointer; box-shadow: 0 8px 20px rgba(24,119,242,0.3);
            transition: 0.3s;
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(24,119,242,0.4); }

        /* 🧭 የታችኛው ሜኑ */
        .nav-container { 
            position: fixed; bottom: 0; width: 100%; background: #ffffff; 
            display: flex; height: 80px; align-items: center; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            z-index: 1000;
        }
        .nav-link { flex: 1; text-align: center; color: #b0b0b0; cursor: pointer; transition: 0.3s; }
        .nav-link.active { color: var(--accent-blue); }
        .nav-link i { font-size: 26px; display: block; margin-bottom: 5px; }
        .nav-link span { font-size: 11px; font-weight: bold; }

        .tab-content { display: none; padding: 30px; }
        .active-tab { display: block; }
    </style>
</head>
<body>

    <header>
        <span class="logo-style">
            <span class="amde-text">AMDE</span><span class="chat-text">-CHAT</span>
        </span>
        <div class="quote-style">
            "ትላንት በዓለት ላይ ጥበብን ቀረጽን፤ ዛሬ በዲጂታሉ ዓለም 'አምድ-ቻት'ን መሰረትን። ከዛጉዌ ታላቅነት ወደ አምድ የቴክኖሎጂ ምህዳር! 🏰✨"
        </div>
    </header>

    <div id="auth-page" class="tab-content active-tab">
        <div class="auth-container">
            <div class="auth-card">
                <h2 style="text-align:center; color: #1a1a1a; margin-bottom: 30px; font-size: 26px;">እንኳን ደህና መጡ</h2>
                <div id="reg-fields" style="display:none;">
                    <input type="text" id="fullName" class="input-field" placeholder="ሙሉ ስም">
                </div>
                <div style="display: flex; border: 2px solid #f0f0f0; border-radius: 15px; overflow: hidden; margin-bottom: 20px; background: #f9f9f9;">
                    <span style="padding: 18px; font-weight: bold; color: #555; background: #eee;">+251</span>
                    <input type="text" id="email" style="border:none; width:100%; padding:18px; outline:none; background:transparent;" placeholder="ስልክ ቁጥር ወይም ኢሜይል">
                </div>
                <input type="password" id="password" class="input-field" placeholder="የምስጢር ቁጥር">
                <button class="btn-main" onclick="handleAuth()" id="auth-btn">ግባ</button>
                <p onclick="toggleAuth()" id="toggle-text" style="text-align:center; color: var(--accent-blue); cursor: pointer; margin-top: 25px; font-weight: 600;">አዲስ አካውንት መክፈት እፈልጋለሁ</p>
            </div>
        </div>
    </div>

    <div id="home" class="tab-content"><h3>🏠 የዜና ምንጭ</h3></div>
    <div id="chat" class="tab-content"><h3>💬 መልዕክቶች</h3></div>
    <div id="video" class="tab-content"><h3>🎥 ቪዲዮዎች</h3></div>
    <div id="settings" class="tab-content"><h3>⚙️ Profile</h3><button class="btn-main" style="background:#ff4757" onclick="logout()">ውጣ (Logout)</button></div>

    <nav class="nav-container" id="nav-bar" style="display:none;">
        <div class="nav-link active" onclick="showTab('home', this)"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-link" onclick="showTab('chat', this)"><i class="fas fa-comments"></i><span>Chat</span></div>
        <div class="nav-link" onclick="showTab('video', this)"><i class="fas fa-play-circle"></i><span>Video</span></div>
        <div class="nav-link" onclick="showTab('settings', this)"><i class="fas fa-user-circle"></i><span>Profile</span></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHcrGqhXf4tkIqPi1sMCFC4zo9XrRoBFE",
            authDomain: "amde-chat-46e14.firebaseapp.com",
            projectId: "amde-chat-46e14",
            storageBucket: "amde-chat-46e14.firebasestorage.app",
            messagingSenderId: "1087288685786",
            appId: "1:1087288685786:web:467d7fce6555cc0544a1e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.showTab = (id, el) => {
            document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('nav-bar').style.display = 'flex';
                document.getElementById('home').classList.add('active-tab');
            } else {
                document.getElementById('auth-page').style.display = 'block';
                document.getElementById('nav-bar').style.display = 'none';
            }
        });

        window.handleAuth = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            const isReg = document.getElementById('auth-btn').innerText === "ተመዝገብ";
            const finalEmail = e.includes('@') ? e : e + "@amde.com"; 
            try {
                if (isReg) {
                    const fn = document.getElementById('fullName').value;
                    const uc = await createUserWithEmailAndPassword(auth, finalEmail, p);
                    await setDoc(doc(db, "users", uc.user.uid), { fullName: fn, email: e });
                } else {
                    await signInWithEmailAndPassword(auth, finalEmail, p);
                }
            } catch (err) { alert(err.message); }
        };

        window.toggleAuth = () => {
            const isLogin = document.getElementById('auth-btn').innerText === "ግባ";
            document.getElementById('auth-btn').innerText = isLogin ? "ተመዝገብ" : "ግባ";
            document.getElementById('reg-fields').style.display = isLogin ? "block" : "none";
            document.getElementById('toggle-text').innerText = isLogin ? "አካውንት አለኝ? ተመለስ" : "አዲስ አካውንት መክፈት እፈልጋለሁ";
        };

        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
