<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amde-Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary-blue: #1877F2; 
            --royal-gold: #FFD700; 
            --dark-onyx: #121212; 
            --glass-white: rgba(255, 255, 255, 0.95);
        }

        body { 
            font-family: 'Noto Sans Ethiopic', sans-serif; 
            background: #f4f7f6; 
            margin: 0; 
            padding-bottom: 80px; 
        }
        
        /* 🏰 የዛጉዌ ታላቅነት ራስጌ */
        header { 
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%); 
            color: var(--royal-gold); 
            padding: 35px 20px; 
            text-align: center; 
            border-bottom: 4px solid var(--royal-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .logo-main {
            font-family: 'Cinzel', serif;
            font-size: 36px;
            color: #ffffff;
            letter-spacing: 4px;
            margin-bottom: 10px;
            display: block;
            text-shadow: 2px 2px 4px rgba(255, 215, 0, 0.3);
        }

        .quote-box {
            font-size: 17px;
            line-height: 1.8;
            color: var(--royal-gold);
            max-width: 600px;
            margin: 0 auto;
            font-weight: 500;
        }

        /* 🔒 መግቢያ ካርድ (Glassmorphism style) */
        .auth-card { 
            background: var(--glass-white); 
            padding: 40px 30px; 
            border-radius: 25px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            max-width: 420px;
            margin: -30px auto 0;
            position: relative;
            z-index: 10;
        }

        .input-box { 
            width: 100%; padding: 16px; margin-bottom: 20px; 
            border: 2px solid #e0e0e0; border-radius: 12px; 
            font-size: 16px; outline: none; transition: 0.3s;
        }
        .input-box:focus { border-color: var(--primary-blue); }
        
        .phone-input-row { 
            display: flex; border: 2px solid #e0e0e0; 
            border-radius: 12px; overflow: hidden; margin-bottom: 20px; 
        }
        .phone-input-row span { background: #eee; padding: 16px; font-weight: bold; border-right: 2px solid #e0e0e0; }
        
        .action-btn { 
            background: linear-gradient(to right, #1877F2, #0052cc); 
            color: white; border: none; padding: 18px; width: 100%; 
            border-radius: 12px; font-weight: bold; font-size: 18px; 
            cursor: pointer; box-shadow: 0 5px 15px rgba(24,119,242,0.4);
        }

        /* 🧭 Bottom Nav (Premium Look) */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; background: #ffffff; 
            display: flex; height: 75px; align-items: center; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }
        .nav-link { flex: 1; text-align: center; color: #888; cursor: pointer; transition: 0.3s; }
        .nav-link.active { color: var(--primary-blue); }
        .nav-link i { font-size: 26px; display: block; margin-bottom: 4px; }
        .nav-link span { font-size: 11px; font-weight: 700; }

        .tab-page { display: none; padding: 30px; }
        .active-tab { display: block; }
    </style>
</head>
<body>

    <header>
        <span class="logo-main">AMDE-CHAT</span>
        <div class="quote-box">
            "ትላንት በዓለት ላይ ጥበብን ቀረጽን፤ ዛሬ በዲጂታሉ ዓለም 'አምድ-ቻት'ን መሰረትን። ከዛጉዌ ታላቅነት ወደ አምድ የቴክኖሎጂ ምህዳር! 🏰✨"
        </div>
    </header>

    <div id="auth-page" class="tab-page active-tab">
        <div class="auth-card">
            <h2 style="text-align:center; color: #333; margin-bottom: 30px;">እንኳን ደህና መጡ</h2>
            <div id="reg-fields" style="display:none;">
                <input type="text" id="fullName" class="input-box" placeholder="ሙሉ ስም">
            </div>
            <div class="phone-input-row">
                <span>+251</span>
                <input type="text" id="email" style="border:none; width:100%; padding:16px; outline:none;" placeholder="ስልክ ቁጥር ወይም ኢሜይል">
            </div>
            <input type="password" id="password" class="input-box" placeholder="የምስጢር ቁጥር">
            <button class="action-btn" onclick="handleAuth()" id="auth-btn">ግባ</button>
            <p onclick="toggleAuth()" id="toggle-text" style="text-align:center; color: var(--primary-blue); cursor: pointer; margin-top: 25px; font-weight: 600;">አዲስ አካውንት መክፈት እፈልጋለሁ</p>
        </div>
    </div>

    <div id="home" class="tab-page"><h3>🏠 የዜና ምንጭ</h3></div>
    <div id="chat" class="tab-page"><h3>💬 መልዕክቶች</h3></div>
    <div id="video" class="tab-page"><h3>🎥 ቪዲዮዎች</h3></div>
    <div id="settings" class="tab-page"><h3>⚙️ Profile</h3><button class="action-btn" style="background:#ff4b2b" onclick="logout()">ውጣ (Logout)</button></div>

    <nav class="nav-bar" id="nav-bar" style="display:none;">
        <div class="nav-link active" onclick="showTab('home', this)"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-link" onclick="showTab('chat', this)"><i class="fas fa-comments"></i><span>Chat</span></div>
        <div class="nav-link" onclick="showTab('video', this)"><i class="fas fa-play-circle"></i><span>Video</span></div>
        <div class="nav-link" onclick="showTab('settings', this)"><i class="fas fa-user-circle"></i><span>Profile</span></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHcrGqhXf4tkIqPi1sMCFC4zo9XrRoBFE",
            authDomain: "amde-chat-46e14.firebaseapp.com",
            projectId: "amde-chat-46e14",
            storageBucket: "amde-chat-46e14.firebasestorage.app",
            messagingSenderId: "1087288685786",
            appId: "1:1087288685786:web:467d7fce6555cc0544a1e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.showTab = (id, el) => {
            document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('nav-bar').style.display = 'flex';
                document.getElementById('home').classList.add('active-tab');
            } else {
                document.getElementById('auth-page').style.display = 'block';
                document.getElementById('nav-bar').style.display = 'none';
            }
        });

        window.handleAuth = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            const isReg = document.getElementById('auth-btn').innerText === "ተመዝገብ";
            const finalEmail = e.includes('@') ? e : e + "@amde.com"; 
            try {
                if (isReg) {
                    const fn = document.getElementById('fullName').value;
                    const uc = await createUserWithEmailAndPassword(auth, finalEmail, p);
                    await setDoc(doc(db, "users", uc.user.uid), { fullName: fn, email: e });
                } else {
                    await signInWithEmailAndPassword(auth, finalEmail, p);
                }
            } catch (err) { alert(err.message); }
        };

        window.toggleAuth = () => {
            const isLogin = document.getElementById('auth-btn').innerText === "ግባ";
            document.getElementById('auth-btn').innerText = isLogin ? "ተመዝገብ" : "ግባ";
            document.getElementById('reg-fields').style.display = isLogin ? "block" : "none";
            document.getElementById('toggle-text').innerText = isLogin ? "አካውንት አለኝ? ተመለስ" : "አዲስ አካውንት መክፈት እፈልጋለሁ";
        };

        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
