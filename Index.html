<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amde-Chat Final Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --rainbow: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            --premium-grad: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --bright-blue: #007bff;
        }

        body { 
            font-family: 'Noto Sans Ethiopic', sans-serif; 
            background: #ffffff; /* ጥቁር ያልሆነ ንጹህ ጀርባ */
            margin: 0; 
            padding-bottom: 90px;
            color: #333;
        }

        /* 🌈 ባለቀለም Header */
        header { 
            padding: 25px 15px; 
            text-align: center; 
            background: #fff; 
            border-bottom: 5px solid; 
            border-image: var(--rainbow) 1;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .brand-name { 
            font-family: 'Orbitron'; 
            font-size: 38px; 
            background: var(--rainbow); 
            -webkit-background-clip: text; 
            color: transparent; 
            animation: rainbow-anim 3s infinite linear;
            font-weight: 900;
        }

        @keyframes rainbow-anim { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        
        /* 👑 ጥቅሱ በሚያምር Background */
        .premium-quote { 
            background: var(--premium-grad); 
            color: #fff; 
            padding: 20px; 
            border-radius: 15px; 
            margin: 20px auto; 
            max-width: 500px; 
            font-weight: bold; 
            text-align: center;
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.3);
        }

        /* 📝 Post Box */
        .post-box { 
            background: #fff; 
            border-radius: 15px; 
            padding: 15px; 
            margin: 20px auto; 
            max-width: 500px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border: 1px solid #eee;
        }
        .post-box textarea { width: 100%; border: none; outline: none; font-size: 16px; resize: none; background: transparent; }
        .post-actions { border-top: 1px solid #eee; padding-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .file-btn { color: #f5576c; cursor: pointer; font-size: 22px; }
        .btn-post { background: var(--bright-blue); color: #fff; border: none; padding: 10px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,123,255,0.3); }

        /* 🖼️ Feed Cards */
        .feed-card { background: #fff; border-radius: 15px; padding: 20px; margin: 15px auto; max-width: 500px; border-left: 6px solid var(--bright-blue); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .post-user { font-weight: bold; color: #f5576c; margin-bottom: 10px; display: block; }

        /* 💬 Chat */
        .chat-area { height: 65vh; overflow-y: auto; padding: 15px; background: #fdfdfd; border-radius: 15px; max-width: 500px; margin: auto; border: 1px solid #eee; }
        .msg { padding: 12px 18px; border-radius: 20px; margin-bottom: 10px; max-width: 75%; font-size: 15px; }
        .msg.sent { background: var(--bright-blue); color: #fff; margin-left: auto; border-bottom-right-radius: 2px; }
        .msg.recv { background: #f0f0f0; color: #333; border-bottom-left-radius: 2px; }

        /* 🧭 Nav */
        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; height: 75px; border-top: 1px solid #eee; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding-top: 15px; color: #ccc; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--bright-blue); transform: scale(1.1); }
        .nav-item i { font-size: 24px; display: block; }

        .page { display: none; padding: 10px; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="brand-name">AMDE-CHAT</div>
    <div class="premium-quote">"ትላንት በዓለት ላይ ጥበብን ቀረጽን፤ ዛሬ በዲጂታሉ ዓለም 'አምድ-ቻት'ን መሰረትን። 🏰✨"</div>
</header>

<div id="auth-page" class="page active-page">
    <div style="max-width:380px; margin: 40px auto; background:#fff; padding:35px; border-radius:25px; text-align:center; box-shadow:0 15px 35px rgba(0,0,0,0.1);">
        <h2 id="auth-title" style="margin-bottom:25px; color:#333;">እንኳን ደህና መጡ</h2>
        <input type="email" id="email" style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #eee; border-radius:12px; box-sizing:border-box;" placeholder="ኢሜይል">
        <input type="password" id="password" style="width:100%; padding:15px; margin-bottom:20px; border:1px solid #eee; border-radius:12px; box-sizing:border-box;" placeholder="የምስጢር ቁጥር">
        <button onclick="handleAuth()" class="btn-post" style="width:100%; float:none; padding:15px;">ግባ</button>
        <p onclick="toggleAuth()" style="color:var(--bright-blue); cursor:pointer; margin-top:20px; font-weight:bold;">አዲስ አካውንት ለመክፈት</p>
    </div>
</div>

<div id="home" class="page">
    <div class="post-box">
        <textarea id="postTxt" rows="3" placeholder="ምን አዲስ ነገር አለ?"></textarea>
        <div class="post-actions">
            <label class="file-btn"><i class="fas fa-images"></i><input type="file" id="postFile" hidden accept="image/*,video/*"></label>
            <button class="btn-post" onclick="uploadPost()">POST</button>
        </div>
    </div>
    <div id="feed-container"></div>
</div>

<div id="chat" class="page">
    <div class="chat-area" id="chat-box"></div>
    <div style="max-width:500px; margin:15px auto; display:flex; gap:10px;">
        <input type="text" id="msgInput" style="flex:1; padding:15px; border-radius:30px; border:1px solid #eee; outline:none;" placeholder="መልዕክት ይጻፉ...">
        <button onclick="sendMsg()" style="background:var(--bright-blue); color:#fff; border:none; width:50px; height:50px; border-radius:50%; cursor:pointer;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<nav id="navbar" style="display:none;">
    <div class="nav-item active" onclick="showTab('home', this)"><i class="fas fa-th-large"></i><span>Feed</span></div>
    <div class="nav-item" onclick="showTab('chat', this)"><i class="fas fa-comment-dots"></i><span>Chat</span></div>
    <div class="nav-item" onclick="logout()"><i class="fas fa-power-off"></i><span>Exit</span></div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBHcrGqhXf4tkIqPi1sMCFC4zo9XrRoBFE",
        authDomain: "amde-chat-46e14.firebaseapp.com",
        projectId: "amde-chat-46e14",
        storageBucket: "amde-chat-46e14.firebasestorage.app",
        messagingSenderId: "1087288685786",
        appId: "1:1087288685786:web:467d7fce6555cc0544a1e3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null;

    onAuthStateChanged(auth, user => {
        if(user) {
            currentUser = user;
            document.getElementById('auth-page').classList.remove('active-page');
            document.getElementById('navbar').style.display = 'flex';
            document.getElementById('home').classList.add('active-page');
            loadFeed();
            loadChat();
        } else {
            document.getElementById('auth-page').classList.add('active-page');
            document.getElementById('navbar').style.display = 'none';
        }
    });

    window.uploadPost = async () => {
        const txt = document.getElementById('postTxt').value;
        const file = document.getElementById('postFile').files[0];
        if(!txt && !file) return;
        await addDoc(collection(db, "posts"), {
            text: txt,
            user: currentUser.email.split('@')[0],
            time: serverTimestamp(),
            hasMedia: file ? true : false
        });
        document.getElementById('postTxt').value = "";
    };

    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), snap => {
            const cont = document.getElementById('feed-container');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                cont.innerHTML += `<div class="feed-card">
                    <span class="post-user">@${d.user}</span>
                    <p style="margin:0; font-size:16px; line-height:1.6;">${d.text}</p>
                    ${d.hasMedia ? '<div style="margin-top:10px; color:#aaa; font-size:12px;">📷 Media Attached</div>' : ''}
                </div>`;
            });
        });
    }

    window.sendMsg = async () => {
        const m = document.getElementById('msgInput').value;
        if(!m.trim()) return;
        await addDoc(collection(db, "messages"), {
            text: m,
            sender: currentUser.email,
            time: serverTimestamp()
        });
        document.getElementById('msgInput').value = "";
    };

    function loadChat() {
        onSnapshot(query(collection(db, "messages"), orderBy("time", "asc")), snap => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const cls = d.sender === currentUser.email ? 'sent' : 'recv';
                box.innerHTML += `<div class="msg ${cls}">${d.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.handleAuth = () => {
        const e = document.getElementById('email').value, p = document.getElementById('password').value;
        const isLogin = document.getElementById('auth-title').innerText === "መግቢያ";
        isLogin ? signInWithEmailAndPassword(auth, e, p) : createUserWithEmailAndPassword(auth, e, p);
    };

    window.toggleAuth = () => {
        const t = document.getElementById('auth-title');
        t.innerText = t.innerText === "መግቢያ" ? "ይመዝገቡ" : "መግቢያ";
    };

    window.showTab = (id, el) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    };

    window.logout = () => signOut(auth).then(() => location.reload());
</script>
</body>
</html>
