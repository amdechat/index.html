<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amde-Chat Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Orbitron:wght@500;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --neon-blue: #00f2ff;
            --digital-gold: #ffc107;
            --deep-space: #050505;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Noto Sans Ethiopic', sans-serif; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%); 
            color: #fff;
            margin: 0; 
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* 🏰 Futuristic Header */
        header { 
            padding: 50px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            position: relative;
        }

        .logo-digital {
            font-family: 'Orbitron', sans-serif;
            font-size: 45px;
            font-weight: 900;
            letter-spacing: 6px;
            margin-bottom: 20px;
            display: block;
        }

        .amde-neon {
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; text-shadow: 0 0 20px var(--digital-gold); }
            100% { opacity: 1; }
        }

        .quote-digital {
            font-size: 16px;
            line-height: 1.8;
            color: #ccc;
            max-width: 500px;
            margin: 0 auto;
            border-left: 3px solid var(--digital-gold);
            padding-left: 15px;
            text-align: left;
            background: rgba(255, 193, 7, 0.05);
        }

        /* 🔒 Glassmorphism Auth Card */
        .auth-container { padding: 0 20px; }
        .digital-card { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 25px; 
            border-radius: 30px; 
            max-width: 400px;
            margin: -20px auto 0;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .digital-input { 
            width: 100%; padding: 18px; margin-bottom: 20px; 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 15px; 
            font-size: 16px; 
            outline: none; 
            background: rgba(0,0,0,0.3);
            color: #fff;
            transition: 0.3s;
        }
        .digital-input:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }

        .phone-box {
            display: flex; background: rgba(0,0,0,0.3); border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 20px;
        }
        .phone-box span { padding: 18px; color: var(--digital-gold); font-weight: bold; border-right: 1px solid rgba(255,255,255,0.2); }

        .btn-digital { 
            background: linear-gradient(45deg, var(--neon-blue), #0052cc); 
            color: white; border: none; padding: 18px; width: 100%; 
            border-radius: 15px; font-weight: bold; font-size: 18px; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2);
            transition: 0.3s;
        }
        .btn-digital:hover { transform: scale(1.02); box-shadow: 0 15px 30px rgba(0, 242, 255, 0.4); }

        /* 🧭 Cyber Bottom Nav */
        .cyber-nav { 
            position: fixed; bottom: 15px; left: 15px; right: 15px; 
            background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(10px);
            display: flex; height: 70px; align-items: center; 
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }
        .nav-link { flex: 1; text-align: center; color: #666; cursor: pointer; transition: 0.3s; }
        .nav-link.active { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        .nav-link i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-link span { font-size: 10px; font-weight: bold; text-transform: uppercase; }

        .tab-content { display: none; padding: 30px; animation: slideUp 0.5s ease; }
        .active-tab { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <span class="logo-digital">
            <span class="amde-neon">AMDE</span><span style="color:var(--digital-gold)">-CHAT</span>
        </span>
        <div class="quote-digital">
            "ትላንት በዓለት ላይ ጥበብን ቀረጽን፤ ዛሬ በዲጂታሉ ዓለም 'አምድ-ቻት'ን መሰረትን። ከዛጉዌ ታላቅነት ወደ አምድ የቴክኖሎጂ ምህዳር! 🏰✨"
        </div>
    </header>

    <div id="auth-page" class="tab-content active-tab">
        <div class="auth-container">
            <div class="digital-card">
                <h2 style="text-align:center; font-family:'Orbitron'; color: #fff; margin-bottom: 30px;">SYSTEM LOGIN</h2>
                <div id="reg-fields" style="display:none;">
                    <input type="text" id="fullName" class="digital-input" placeholder="FULL NAME">
                </div>
                <div class="phone-box">
                    <span>+251</span>
                    <input type="text" id="email" style="background:transparent; border:none; color:white; padding:18px; outline:none; width:100%" placeholder="PHONE OR EMAIL">
                </div>
                <input type="password" id="password" class="digital-input" placeholder="PASSWORD">
                <button class="btn-digital" onclick="handleAuth()" id="auth-btn">ACCESS SYSTEM</button>
                <p onclick="toggleAuth()" id="toggle-text" style="text-align:center; color: var(--neon-blue); cursor: pointer; margin-top: 25px; font-size: 12px; font-weight: bold;">CREATE NEW ACCOUNT</p>
            </div>
        </div>
    </div>

    <div id="home" class="tab-content"><h3>🏠 DIGITAL FEED</h3><div style="height:200px; border:1px dashed #333; border-radius:15px"></div></div>
    <div id="chat" class="tab-content"><h3>💬 SECURE CHAT</h3></div>
    <div id="video" class="tab-content"><h3>🎥 STREAMING</h3></div>
    <div id="settings" class="tab-content"><h3>⚙️ SYSTEM CONFIG</h3><button class="btn-digital" style="background: #ff4757" onclick="logout()">TERMINATE SESSION</button></div>

    <nav class="cyber-nav" id="nav-bar" style="display:none;">
        <div class="nav-link active" onclick="showTab('home', this)"><i class="fas fa-th-large"></i><span>Home</span></div>
        <div class="nav-link" onclick="showTab('chat', this)"><i class="fas fa-comment-slash"></i><span>Chat</span></div>
        <div class="nav-link" onclick="showTab('video', this)"><i class="fas fa-play"></i><span>Stream</span></div>
        <div class="nav-link" onclick="showTab('settings', this)"><i class="fas fa-ghost"></i><span>Config</span></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHcrGqhXf4tkIqPi1sMCFC4zo9XrRoBFE",
            authDomain: "amde-chat-46e14.firebaseapp.com",
            projectId: "amde-chat-46e14",
            storageBucket: "amde-chat-46e14.firebasestorage.app",
            messagingSenderId: "1087288685786",
            appId: "1:1087288685786:web:467d7fce6555cc0544a1e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.showTab = (id, el) => {
            document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('nav-bar').style.display = 'flex';
                document.getElementById('home').classList.add('active-tab');
            } else {
                document.getElementById('auth-page').style.display = 'block';
                document.getElementById('nav-bar').style.display = 'none';
            }
        });

        window.handleAuth = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            const isReg = document.getElementById('auth-btn').innerText === "CREATE NEW ACCOUNT" || document.getElementById('auth-btn').innerText === "ተመዝገብ";
            const finalEmail = e.includes('@') ? e : e + "@amde.com"; 
            try {
                if (isReg) {
                    const fn = document.getElementById('fullName').value;
                    const uc = await createUserWithEmailAndPassword(auth, finalEmail, p);
                    await setDoc(doc(db, "users", uc.user.uid), { fullName: fn, email: e });
                } else {
                    await signInWithEmailAndPassword(auth, finalEmail, p);
                }
            } catch (err) { alert(err.message); }
        };

        window.toggleAuth = () => {
            const isLogin = document.getElementById('auth-btn').innerText === "ACCESS SYSTEM";
            document.getElementById('auth-btn').innerText = isLogin ? "ተመዝገብ" : "ACCESS SYSTEM";
            document.getElementById('reg-fields').style.display = isLogin ? "block" : "none";
            document.getElementById('toggle-text').innerText = isLogin ? "ALREADY REGISTERED? LOGIN" : "CREATE NEW ACCOUNT";
        };

        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
