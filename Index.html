<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amde-Chat | Digital Zagwe Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --rainbow: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff); }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f8fafb; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; }
        
        /* Branding */
        .brand-name { 
            font-size: 55px; font-weight: 900; background: var(--rainbow); 
            -webkit-background-clip: text; color: transparent; margin-top: 30px; 
            letter-spacing: 4px; text-align: center;
        }
        
        .zagwe-quote { 
            font-style: italic; color: #1a1a1a; font-size: 19px; margin: 20px 30px; 
            font-weight: 600; line-height: 1.7; max-width: 550px; text-align: center;
            border-bottom: 2px solid #eee; padding-bottom: 15px;
        }

        .card { background: #fff; padding: 30px; border-radius: 25px; margin-top: 15px; width: 90%; max-width: 420px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        /* Language Switcher */
        .lang-container { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; }
        .lang-btn { background: #f0f2f5; border: 1px solid #ddd; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .lang-btn.active { background: var(--rainbow); color: white; border: none; }

        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #eee; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn-main { background: var(--rainbow); color: white; border: none; padding: 16px; border-radius: 35px; width: 100%; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; }
        
        /* Feed Styles */
        #home-page { display: none; width: 100%; max-width: 600px; padding: 20px; }
        .post-card { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: left; }
        .post-user { font-weight: bold; color: #f5576c; margin-bottom: 8px; display: block; }
        .media-content { width: 100%; border-radius: 10px; margin-top: 10px; max-height: 450px; object-fit: cover; }
    </style>
</head>
<body>

<div id="auth-page">
    <div class="brand-name">AMDE-CHAT</div>
    
    <div class="zagwe-quote" id="quote-text">
        " ትናንት የዛጉዌ ነገሥታት ዓለቱን አልመው ድንቅ ውቅር እንደሰሩ፤ ዛሬም አንተ በዲጂታሉ ዓለም የታሪክ አሻራህን በቃላትህ ቅረጽ። "
    </div>

    <div class="card">
        <div class="lang-container">
            <button class="lang-btn active" onclick="setLang('am')">አማርኛ</button>
            <button class="lang-btn" onclick="setLang('en')">English</button>
        </div>
        <h2 id="welcome-msg">እንኳን ደህና መጡ</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleAuth()" class="btn-main" id="auth-btn">ግባ / ተመዝገብ</button>
    </div>
</div>

<div id="home-page">
    <div class="brand-name" style="font-size: 30px; margin-top: 10px;">AMDE-CHAT</div>
    <div class="card" style="max-width: 100%; margin-top: 10px;">
        <textarea id="postTxt" placeholder="ምን አዲስ ነገር አለ?"></textarea>
        <input type="file" id="postFile" accept="image/*,video/*">
        <button onclick="uploadPost()" class="btn-main">POST</button>
    </div>
    <div id="feed"></div>
</div>

<script>
    const supabaseUrl = 'https://kwrnjepvkqlvwljsjfvj.supabase.co';
    const supabaseKey = 'sb_publishable_ROrHu97hk6nLIIEFWDFTIA_llXAy4YL';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let currentUser = null;

    const translations = {
        am: {
            welcome: "እንኳን ደህና መጡ",
            authBtn: "ግባ / ተመዝገብ",
            quote: '" ትናንት የዛጉዌ ነገሥታት ዓለቱን አልመው ድንቅ ውቅር እንደሰሩ፤ ዛሬም አንተ በዲጂታሉ ዓለም የታሪክ አሻራህን በቃላትህ ቅረጽ። "'
        },
        en: {
            welcome: "Welcome to Amde-Chat",
            authBtn: "Login / Signup",
            quote: '"As the Zagwe kings carved wonders out of stone, now you carve your digital legacy through your words."'
        }
    };

    function setLang(lang) {
        document.getElementById('welcome-msg').innerText = translations[lang].welcome;
        document.getElementById('auth-btn').innerText = translations[lang].authBtn;
        document.getElementById('quote-text').innerText = translations[lang].quote;
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase().includes(lang === 'am' ? 'አማ' : 'eng')));
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        if(!email || !password) return alert("መረጃ አሟላ / Fill Info");

        const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
        if (error) {
            const { data: upData, error: upError } = await _supabase.auth.signUp({ email, password });
            if (upError) alert(upError.message);
            else enterApp(upData.user);
        } else {
            enterApp(data.user);
        }
    }

    function enterApp(user) {
        currentUser = user;
        document.getElementById('auth-page').style.display = 'none';
        document.getElementById('home-page').style.display = 'block';
        loadFeed();
    }

    async function uploadPost() {
        const txt = document.getElementById('postTxt').value;
        const file = document.getElementById('postFile').files[0];
        let mediaUrl = null;
        let type = null;

        if (file) {
            const fileName = Date.now() + "_" + file.name;
            type = file.type.split('/')[0];
            const { data } = await _supabase.storage.from('post-media').upload(fileName, file);
            if (data) {
                mediaUrl = _supabase.storage.from('post-media').getPublicUrl(fileName).data.publicUrl;
            }
        }

        await _supabase.from('posts').insert([{ 
            content: txt, 
            user_name: currentUser.email, 
            media_url: mediaUrl,
            file_type: type
        }]);

        document.getElementById('postTxt').value = "";
        document.getElementById('postFile').value = "";
        loadFeed();
    }

    async function loadFeed() {
        const { data } = await _supabase.from('posts').select('*').order('created_at', { ascending: false });
        const feed = document.getElementById('feed');
        feed.innerHTML = data.map(p => `
            <div class="post-card">
                <span class="post-user">@${p.user_name.split('@')[0]}</span>
                <p>${p.content}</p>
                ${p.media_url ? (p.file_type === 'video' ? 
                    `<video src="${p.media_url}" controls class="media-content"></video>` : 
                    `<img src="${p.media_url}" class="media-content">`) : ''}
            </div>
        `).join('');
    }
</script>
</body>
</html>
