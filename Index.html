<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amde-Chat Radiant Brand</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+Ethiopic:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --neon-blue: #00f2ff;
            --bright-gold: #ffcc00;
            --deep-space: #050a15; /* ጥቁር ሳይሆን ጥልቅ ሰማያዊ */
            --electric-glow: 0 0 15px rgba(0, 242, 255, 0.6);
        }

        body { 
            font-family: 'Noto Sans Ethiopic', sans-serif; 
            background-color: var(--deep-space);
            background: linear-gradient(180deg, #0a1128 0%, #050a15 100%);
            color: #ffffff;
            margin: 0;
            padding-bottom: 100px;
        }

        /* 🌌 የሚያበራ Header */
        header { 
            padding: 50px 20px;
            text-align: center;
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 8px;
            display: block;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
        }

        .neon-quote {
            font-size: 16px;
            color: var(--bright-gold);
            max-width: 500px;
            margin: 20px auto 0;
            padding: 15px;
            background: rgba(255, 204, 0, 0.1);
            border: 1px solid var(--bright-gold);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 204, 0, 0.3); }
            50% { transform: scale(1.02); box-shadow: 0 0 20px rgba(255, 204, 0, 0.5); }
            100% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 204, 0, 0.3); }
        }

        /* 🔒 Login Box (የሚያበራ) */
        .auth-box { 
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 2px solid var(--neon-blue);
            padding: 40px 25px; 
            border-radius: 25px; 
            max-width: 380px;
            margin: 40px auto;
            box-shadow: var(--electric-glow);
        }

        .digital-input { 
            width: 100%; padding: 15px; margin-bottom: 15px; 
            border: 2px solid rgba(0, 242, 255, 0.3); border-radius: 12px; 
            background: rgba(0, 0, 0, 0.5); color: #fff;
            font-family: 'Orbitron', sans-serif; outline: none; box-sizing: border-box;
        }
        .digital-input:focus { border-color: var(--neon-blue); box-shadow: var(--electric-glow); }

        .btn-access { 
            background: var(--neon-blue); border: none;
            color: #000; padding: 15px; width: 100%; 
            border-radius: 12px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif;
            box-shadow: var(--electric-glow);
        }

        /* 📝 Post Area */
        .post-area { max-width: 480px; margin: 20px auto; padding: 0 15px; }
        .post-input-box { 
            background: rgba(255, 255, 255, 0.08); 
            border: 1px solid var(--neon-blue); 
            border-radius: 15px; padding: 15px; margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .post-input-box textarea { width: 100%; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; }

        .post-card { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 20px; border-radius: 15px; margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .post-user { color: var(--bright-gold); font-weight: bold; margin-bottom: 8px; display: block; }

        /* 🧭 Nav */
        .nav-float { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: rgba(10, 20, 40, 0.9); 
            border: 2px solid var(--neon-blue);
            display: flex; height: 70px; align-items: center; 
            border-radius: 35px; box-shadow: var(--electric-glow);
        }
        .nav-btn { flex: 1; text-align: center; color: #778899; cursor: pointer; }
        .nav-btn.active { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        .page { display: none; padding: 20px; animation: slideUp 0.5s ease; }
        .active-page { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="brand-name">AMDE-CHAT</div>
        <div class="neon-quote">
            "ትላንት በዓለት ላይ ጥበብን ቀረጽን፤ ዛሬ በዲጂታሉ ዓለም 'አምድ-ቻት'ን መሰረትን። 🏰✨"
        </div>
    </header>

    <div id="auth-page" class="page active-page">
        <div class="auth-box">
            <h3 style="text-align:center; color: var(--neon-blue); font-family: 'Orbitron';">WELCOME_USER</h3>
            <div id="reg-fields" style="display:none;">
                <input type="text" id="fullName" class="digital-input" placeholder="FULL NAME">
            </div>
            <input type="text" id="email" class="digital-input" placeholder="EMAIL / PHONE">
            <input type="password" id="password" class="digital-input" placeholder="PASSWORD">
            <button class="btn-access" onclick="handleAuth()" id="auth-btn">ENTER SYSTEM</button>
            <p onclick="toggleAuth()" style="text-align:center; color: #fff; cursor: pointer; margin-top: 20px; font-size: 13px; text-decoration: underline;">CREATE ACCOUNT</p>
        </div>
    </div>

    <div id="home" class="page">
        <div class="post-area">
            <div class="post-input-box">
                <textarea id="postTxt" placeholder="ምን አዲስ መረጃ አለ?"></textarea>
                <button class="btn-access" style="width: 120px; padding: 8px; float: right;" onclick="createPost()">POST</button>
                <div style="clear:both;"></div>
            </div>
            <div id="feed"></div>
        </div>
    </div>

    <div id="chat" class="page"><h4 style="color:var(--neon-blue); text-align:center;">> CHAT_ROOM_ACTIVE</h4></div>
    <div id="video" class="page"><h4 style="color:var(--neon-blue); text-align:center;">> LIVE_STREAM_STATION</h4></div>
    <div id="settings" class="page" style="text-align:center;"><button class="btn-access" style="background:#ff4757; width: auto;" onclick="logout()">LOGOUT</button></div>

    <nav class="nav-float" id="nav-bar" style="display:none;">
        <div class="nav-btn active" onclick="showTab('home', this)"><i class="fas fa-home"></i><span>Feed</span></div>
        <div class="nav-btn" onclick="showTab('chat', this)"><i class="fas fa-comment-dots"></i><span>Chat</span></div>
        <div class="nav-btn" onclick="showTab('video', this)"><i class="fas fa-play-circle"></i><span>Live</span></div>
        <div class="nav-btn" onclick="showTab('settings', this)"><i class="fas fa-cog"></i><span>Set</span></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHcrGqhXf4tkIqPi1sMCFC4zo9XrRoBFE",
            authDomain: "amde-chat-46e14.firebaseapp.com",
            projectId: "amde-chat-46e14",
            storageBucket: "amde-chat-46e14.firebasestorage.app",
            messagingSenderId: "1087288685786",
            appId: "1:1087288685786:web:467d7fce6555cc0544a1e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null;

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('nav-bar').style.display = 'flex';
                document.getElementById('home').classList.add('active-page');
                loadFeed();
            } else {
                document.getElementById('auth-page').style.display = 'block';
                document.getElementById('nav-bar').style.display = 'none';
            }
        });

        window.createPost = async () => {
            const txt = document.getElementById('postTxt').value;
            if(!txt.trim()) return;
            await addDoc(collection(db, "posts"), {
                text: txt,
                user: user.email.split('@')[0],
                time: serverTimestamp()
            });
            document.getElementById('postTxt').value = "";
        };

        function loadFeed() {
            const q = query(collection(db, "posts"), orderBy("time", "desc"));
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('feed');
                feed.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    feed.innerHTML += `
                        <div class="post-card">
                            <span class="post-user">@${d.user}</span>
                            <div>${d.text}</div>
                        </div>
                    `;
                });
            });
        }

        window.handleAuth = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            const isReg = document.getElementById('auth-btn').innerText === "ተመዝገብ";
            const finalEmail = e.includes('@') ? e : e + "@amde.com"; 
            try {
                isReg ? await createUserWithEmailAndPassword(auth, finalEmail, p) : await signInWithEmailAndPassword(auth, finalEmail, p);
            } catch (err) { alert(err.message); }
        };

        window.toggleAuth = () => {
            const isLogin = document.getElementById('auth-btn').innerText === "ENTER SYSTEM";
            document.getElementById('auth-btn').innerText = isLogin ? "ተመዝገብ" : "ENTER SYSTEM";
            document.getElementById('reg-fields').style.display = isLogin ? "block" : "none";
        };

        window.showTab = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-btn').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        };

        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
