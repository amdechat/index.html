<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amde-Chat | Ultimate Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --rainbow: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            --bright-blue: #007bff;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; background: #f9f9f9; }
        header { padding: 20px; text-align: center; background: #fff; border-bottom: 5px solid; border-image: var(--rainbow) 1; position: sticky; top: 0; z-index: 1000; }
        .brand-name { font-size: 32px; font-weight: 900; background: var(--rainbow); -webkit-background-clip: text; color: transparent; letter-spacing: 2px; }
        
        /* Feed & UI */
        .page { display: none; padding: 15px; max-width: 600px; margin: auto; }
        .active-page { display: block; }
        .post-card { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .post-user { font-weight: bold; color: #f5576c; }
        
        /* Media */
        .media-content { width: 100%; border-radius: 10px; margin-top: 10px; max-height: 400px; object-fit: cover; }
        
        /* Post Box */
        .post-box { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #eee; }
        textarea { width: 100%; border: none; outline: none; font-size: 16px; resize: none; }
        .post-actions { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; padding-top: 10px; }
        
        /* Navigation */
        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; height: 70px; border-top: 1px solid #eee; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .nav-item { flex: 1; text-align: center; padding: 12px; color: #999; cursor: pointer; font-size: 20px; }
        .nav-item.active { color: #007bff; transform: scale(1.1); }
        
        /* Chat */
        .chat-box { height: 70vh; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { padding: 10px 15px; margin: 5px; border-radius: 18px; max-width: 75%; font-size: 14px; }
        .sent { background: var(--bright-blue); color: white; align-self: flex-end; }
        .recv { background: #e9e9eb; color: black; align-self: flex-start; }

        .btn-post { background: var(--bright-blue); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header><div class="brand-name">AMDE-CHAT</div></header>

<div id="auth-page" class="page active-page">
    <div style="text-align: center; margin-top: 50px;">
        <h2>እንኳን ደህና መጡ</h2>
        <input type="email" id="email" placeholder="ኢሜይል" style="width: 90%; padding: 12px; margin: 10px; border-radius: 10px; border: 1px solid #ddd;">
        <input type="password" id="password" placeholder="የምስጢር ቁጥር" style="width: 90%; padding: 12px; margin: 10px; border-radius: 10px; border: 1px solid #ddd;">
        <button onclick="handleAuth()" class="btn-post" style="width: 95%; padding: 12px;">ግባ / ተመዝገብ</button>
    </div>
</div>

<div id="home" class="page">
    <div class="post-box">
        <textarea id="postTxt" rows="3" placeholder="ምን አዲስ ነገር አለ?"></textarea>
        <div class="post-actions">
            <label style="cursor: pointer; color: #f5576c;"><i class="fas fa-camera"></i> ፎቶ/ቪዲዮ
                <input type="file" id="postFile" hidden accept="image/*,video/*">
            </label>
            <button class="btn-post" onclick="uploadPost()">POST</button>
        </div>
    </div>
    <div id="feed-container"></div>
</div>

<div id="chat" class="page">
    <div class="chat-box" id="chat-messages"></div>
    <div style="display: flex; gap: 10px; padding-top: 10px;">
        <input type="text" id="msgInput" placeholder="መልዕክት..." style="flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd;">
        <button onclick="sendMsg()" class="btn-post"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<nav id="navbar" style="display:none;">
    <div class="nav-item active" onclick="showTab('home', this)"><i class="fas fa-home"></i></div>
    <div class="nav-item" onclick="showTab('chat', this)"><i class="fas fa-comment"></i></div>
    <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i></div>
</nav>

<script>
    const supabaseUrl = 'https://kwrnjepvkqlvwljsjfvj.supabase.co';
    const supabaseKey = 'sb_publishable_ROrHu97hk6nLIIEFWDFTIA_llXAy4YL';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let currentUser = null;

    // Authentication
    async function handleAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await _supabase.auth.signUp({ email, password });
        
        if (error) { // አካውንት ካለው እንዲገባ ማድረግ
            const { data: logData, error: logError } = await _supabase.auth.signInWithPassword({ email, password });
            if (logError) alert(logError.message);
            else initApp(logData.user);
        } else {
            alert("የማረጋገጫ ኢሜይል ተልኳል ወይም መግባት ትችላለህ!");
            initApp(data.user);
        }
    }

    function initApp(user) {
        currentUser = user;
        document.getElementById('auth-page').classList.remove('active-page');
        document.getElementById('navbar').style.display = 'flex';
        document.getElementById('home').classList.add('active-page');
        loadFeed();
        loadChat();
    }

    // Upload Post (Image, Video & Text)
    async function uploadPost() {
        const txt = document.getElementById('postTxt').value;
        const file = document.getElementById('postFile').files[0];
        let mediaUrl = null;
        let type = null;

        if (!txt && !file) return;

        if (file) {
            const fileName = Date.now() + "_" + file.name;
            type = file.type.split('/')[0]; // 'image' or 'video'
            const { data } = await _supabase.storage.from('post-media').upload(fileName, file);
            if (data) {
                mediaUrl = _supabase.storage.from('post-media').getPublicUrl(fileName).data.publicUrl;
            }
        }

        await _supabase.from('posts').insert([{ 
            content: txt, 
            user_name: currentUser.email, 
            media_url: mediaUrl,
            file_type: type
        }]);

        document.getElementById('postTxt').value = "";
        document.getElementById('postFile').value = "";
        loadFeed();
    }

    async function loadFeed() {
        const { data } = await _supabase.from('posts').select('*').order('created_at', { ascending: false });
        const cont = document.getElementById('feed-container');
        cont.innerHTML = data.map(p => `
            <div class="post-card">
                <div class="post-user">@${p.user_name.split('@')[0]}</div>
                <p>${p.content}</p>
                ${p.media_url ? (p.file_type === 'video' ? 
                    `<video src="${p.media_url}" controls class="media-content"></video>` : 
                    `<img src="${p.media_url}" class="media-content">`) : ''}
            </div>
        `).join('');
    }

    // Chat Logic
    async function sendMsg() {
        const msg = document.getElementById('msgInput').value;
        if (!msg) return;
        await _supabase.from('messages').insert([{ message: msg, sender: currentUser.email }]);
        document.getElementById('msgInput').value = "";
    }

    function loadChat() {
        _supabase.from('messages').select('*').order('created_at', { ascending: true }).then(({ data }) => {
            const box = document.getElementById('chat-messages');
            box.innerHTML = data.map(m => `
                <div class="msg ${m.sender === currentUser.email ? 'sent' : 'recv'}">${m.message}</div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        });
        
        // Realtime
        _supabase.channel('messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, loadChat).subscribe();
    }

    function showTab(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(id === 'home') loadFeed();
    }

    function logout() { location.reload(); }
</script>
</body>
</html>
