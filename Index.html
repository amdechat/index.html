<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amde-Chat Digital Brand</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+Ethiopic:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --neon-blue: #00d2ff;
            --dim-gold: #c6a300;
            --tech-black: #080808;
            --glow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        body { 
            font-family: 'Noto Sans Ethiopic', sans-serif; 
            background-color: var(--tech-black);
            color: #e0e0e0;
            margin: 0;
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        /* 🌌 Tech Header */
        header { 
            padding: 60px 20px;
            text-align: center;
            background: radial-gradient(circle at top, #1a1a1a 0%, #080808 100%);
            border-bottom: 1px solid rgba(0, 210, 255, 0.2);
        }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 40px;
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 25px;
            display: block;
        }

        .amde-glow {
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
        }

        /* ✨ ብልጭ ድርግም የሚለው ጥቅስ (Blinking Neon) */
        .neon-quote {
            font-size: 15px;
            line-height: 1.8;
            color: var(--dim-gold);
            max-width: 450px;
            margin: 0 auto;
            padding: 15px;
            border: 1px solid rgba(198, 163, 0, 0.3);
            border-radius: 5px;
            animation: blink 4s infinite;
        }

        @keyframes blink {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 0 0 5px var(--dim-gold), 0 0 10px var(--dim-gold);
                opacity: 1;
                border-color: rgba(198, 163, 0, 0.6);
            }
            20%, 24%, 55% {
                text-shadow: none;
                opacity: 0.4;
                border-color: rgba(198, 163, 0, 0.1);
            }
        }

        /* 🔒 Dim Light Auth Card */
        .auth-box { 
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px 25px; 
            border-radius: 20px; 
            max-width: 380px;
            margin: -30px auto 0;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .digital-input { 
            width: 100%; padding: 15px; margin-bottom: 15px; 
            border: 1px solid #333; border-radius: 8px; 
            background: #000; color: var(--neon-blue);
            font-family: 'Orbitron', sans-serif; font-size: 14px;
            outline: none; transition: 0.4s;
        }
        .digital-input:focus { border-color: var(--neon-blue); box-shadow: var(--glow); }

        .btn-access { 
            background: none; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 15px; width: 100%; 
            border-radius: 8px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 3px;
            transition: 0.3s; font-family: 'Orbitron', sans-serif;
        }
        .btn-access:hover { background: var(--neon-blue); color: #000; box-shadow: var(--glow); }

        /* 📝 New Post Styles */
        .post-container { max-width: 500px; margin: 20px auto; padding: 0 15px; }
        .post-box { background: #000; border: 1px solid var(--neon-blue); padding: 15px; border-radius: 10px; margin-bottom: 30px; }
        .post-box textarea { width: 100%; background: transparent; border: none; color: white; resize: none; outline: none; font-size: 16px; }
        .post-card { background: rgba(255,255,255,0.03); border: 1px solid #222; border-left: 3px solid var(--neon-blue); padding: 15px; border-radius: 8px; margin-bottom: 15px; animation: fadeIn 0.5s; }
        .post-user { color: var(--dim-gold); font-size: 12px; font-weight: bold; margin-bottom: 5px; display: block; }

        /* 🧭 Floating Navigation */
        .nav-float { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: rgba(10, 10, 10, 0.9); 
            border: 1px solid rgba(0, 210, 255, 0.3);
            display: flex; height: 65px; align-items: center; 
            border-radius: 50px; z-index: 1000;
        }
        .nav-btn { flex: 1; text-align: center; color: #444; cursor: pointer; }
        .nav-btn.active { color: var(--neon-blue); }
        .nav-btn i { font-size: 20px; display: block; }
        .nav-btn span { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }

        .page { display: none; padding: 20px; animation: fadeIn 0.8s; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="brand-name">
            <span class="amde-glow">AMDE</span><span style="color:#444;">-CHAT</span>
        </div>
        <div class="neon-quote">
            "ትላንት በዓለት ላይ ጥበብን ቀረጽን፤ ዛሬ በዲጂታሉ ዓለም 'አምድ-ቻት'ን መሰረትን። ከዛጉዌ ታላቅነት ወደ አምድ የቴክኖሎጂ ምህዳር! 🏰✨"
        </div>
    </header>

    <div id="auth-page" class="page active-page">
        <div class="auth-box">
            <h3 style="text-align:center; letter-spacing:4px; font-family:'Orbitron'; color:#666;">LOGIN_REQUIRED</h3>
            <div id="reg-fields" style="display:none;">
                <input type="text" id="fullName" class="digital-input" placeholder="FULL_NAME">
            </div>
            <input type="text" id="email" class="digital-input" placeholder="ID / PHONE_NUM">
            <input type="password" id="password" class="digital-input" placeholder="ACCESS_CODE">
            <button class="btn-access" onclick="handleAuth()" id="auth-btn">INITIALIZE</button>
            <p onclick="toggleAuth()" id="toggle-text" style="text-align:center; color: #444; cursor: pointer; margin-top: 20px; font-size: 11px;">CREATE_NEW_ID</p>
        </div>
    </div>

    <div id="home" class="page">
        <div class="post-container">
            <div class="post-box">
                <textarea id="postTxt" placeholder="WRITE_DATA_CORE..."></textarea>
                <button class="btn-access" style="padding: 5px; font-size: 12px;" onclick="createPost()">EXECUTE_POST</button>
            </div>
            <div id="feed"></div>
        </div>
    </div>

    <div id="chat" class="page"><h4 style="color:var(--neon-blue)">> ENCRYPTED_CHATS</h4></div>
    <div id="video" class="page"><h4 style="color:var(--neon-blue)">> STREAM_STATION</h4></div>
    <div id="settings" class="page" style="text-align:center;"><button class="btn-access" style="border-color:#ff4757; color:#ff4757; width: auto;" onclick="logout()">TERMINATE</button></div>

    <nav class="nav-float" id="nav-bar" style="display:none;">
        <div class="nav-btn active" onclick="showTab('home', this)"><i class="fas fa-terminal"></i><span>Feed</span></div>
        <div class="nav-btn" onclick="showTab('chat', this)"><i class="fas fa-satellite-dish"></i><span>Chat</span></div>
        <div class="nav-btn" onclick="showTab('video', this)"><i class="fas fa-broadcast-tower"></i><span>Live</span></div>
        <div class="nav-item nav-btn" onclick="showTab('settings', this)"><i class="fas fa-user-secret"></i><span>Admin</span></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHcrGqhXf4tkIqPi1sMCFC4zo9XrRoBFE",
            authDomain: "amde-chat-46e14.firebaseapp.com",
            projectId: "amde-chat-46e14",
            storageBucket: "amde-chat-46e14.firebasestorage.app",
            messagingSenderId: "1087288685786",
            appId: "1:1087288685786:web:467d7fce6555cc0544a1e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('nav-bar').style.display = 'flex';
                document.getElementById('home').classList.add('active-page');
                loadFeed();
            } else {
                document.getElementById('auth-page').style.display = 'block';
                document.getElementById('nav-bar').style.display = 'none';
            }
        });

        window.createPost = async () => {
            const txt = document.getElementById('postTxt').value;
            if(!txt.trim()) return;
            await addDoc(collection(db, "posts"), {
                text: txt,
                user: currentUser.email.split('@')[0],
                time: serverTimestamp()
            });
            document.getElementById('postTxt').value = "";
        };

        function loadFeed() {
            const q = query(collection(db, "posts"), orderBy("time", "desc"));
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('feed');
                feed.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    feed.innerHTML += `
                        <div class="post-card">
                            <span class="post-user">@${d.user}</span>
                            <div>${d.text}</div>
                        </div>
                    `;
                });
            });
        }

        window.handleAuth = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            const isReg = document.getElementById('auth-btn').innerText === "ተመዝገብ";
            const finalEmail = e.includes('@') ? e : e + "@amde.com"; 
            try {
                isReg ? await createUserWithEmailAndPassword(auth, finalEmail, p) : await signInWithEmailAndPassword(auth, finalEmail, p);
            } catch (err) { alert(err.message); }
        };

        window.toggleAuth = () => {
            const isLogin = document.getElementById('auth-btn').innerText === "INITIALIZE";
            document.getElementById('auth-btn').innerText = isLogin ? "ተመዝገብ" : "INITIALIZE";
            document.getElementById('reg-fields').style.display = isLogin ? "block" : "none";
        };

        window.showTab = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-btn').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        };

        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
